name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: '22.12.0'
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run dist
